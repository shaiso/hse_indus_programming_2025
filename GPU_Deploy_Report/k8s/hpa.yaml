apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: resnet-hpa
  namespace: ml-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: resnet-inference
  minReplicas: 2
  maxReplicas: 8
  metrics:
    # Масштабируем по CPU (как прокси нагрузки)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
